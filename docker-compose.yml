version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=attendance_user
      - DB_PASSWORD=attendance_password
      - DB_NAME=attendance_db
      - DB_SSLMODE=disable
      - JWT_SECRET=your-secret-key-change-in-production
      - SERVER_PORT=8080
      - ENV=development
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
      - /app/tmp
    depends_on:
      db:
        condition: service_healthy
    networks:
      - attendance-network

  db:
    image: postgres:16-alpine
    container_name: attendance-db
    environment:
      - POSTGRES_USER=attendance_user
      - POSTGRES_PASSWORD=attendance_password
      - POSTGRES_DB=attendance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance_user -d attendance_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - attendance-network

volumes:
  postgres-data:
  go-modules:

networks:
  attendance-network:
    driver: bridge
