post:
  summary: 休憩終了
  description: 休憩終了時刻を記録します
  operationId: endBreak
  tags:
    - attendance
  security:
    - bearerAuth: []
  responses:
    '200':
      description: 休憩終了記録成功
      content:
        application/json:
          schema:
            $ref: '../schemas/Attendance.yaml'
    '400':
      description: 休憩開始記録がない、またはすでに休憩終了済み
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
          examples:
            notStarted:
              value:
                error: must start break before ending it
            alreadyEnded:
              value:
                error: break already ended
    '401':
      $ref: '../responses/UnauthorizedError.yaml'
