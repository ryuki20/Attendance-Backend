get:
  summary: 認証情報取得
  description: 現在ログイン中のユーザー情報を取得します
  operationId: getMe
  tags:
    - auth
  security:
    - bearerAuth: []
  responses:
    '200':
      description: ユーザー情報取得成功
      content:
        application/json:
          schema:
            type: object
            properties:
              user_id:
                type: integer
                example: 1
                description: ユーザーID
              role:
                type: string
                example: employee
                description: ロール
    '401':
      $ref: '../responses/UnauthorizedError.yaml'
