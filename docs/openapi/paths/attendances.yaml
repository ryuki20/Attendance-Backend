get:
  summary: 勤怠一覧取得
  description: |
    指定した年月の勤怠一覧を取得します。
    自分の勤怠のみ取得できます。
  operationId: getAttendances
  tags:
    - attendance
  security:
    - bearerAuth: []
  parameters:
    - name: year_month
      description: 対象年月（YYYY-MM形式）
      in: query
      required: true
      schema:
        type: string
        pattern: "^\\d{4}-(0[1-9]|1[0-2])$"
        example: "2026-04"
  responses:
    '200':
      description: 勤怠一覧取得成功
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../schemas/Attendance.yaml'
    '400':
      description: パラメータエラー
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
          example:
            error: invalid year_month format (use YYYY-MM)
    '401':
      $ref: '../responses/UnauthorizedError.yaml'
    '422':
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
          example:
            error: validation error
    '500':
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
          example:
            error: internal server error
