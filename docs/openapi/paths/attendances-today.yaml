get:
  summary: 今日の勤怠取得
  description: 今日の勤怠記録を取得します
  operationId: getTodayAttendance
  tags:
    - attendance
  security:
    - bearerAuth: []
  responses:
    '200':
      description: 勤怠記録取得成功
      content:
        application/json:
          schema:
            $ref: '../schemas/Attendance.yaml'
    '404':
      description: 今日の勤怠記録が見つかりません
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
          example:
            error: no attendance record found for today
    '401':
      $ref: '../responses/UnauthorizedError.yaml'
