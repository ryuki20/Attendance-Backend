post:
  summary: 休憩開始
  description: 休憩開始時刻を記録します
  operationId: startBreak
  tags:
    - attendance
  security:
    - bearerAuth: []
  responses:
    '200':
      description: 休憩開始記録成功
      content:
        application/json:
          schema:
            $ref: '../schemas/Attendance.yaml'
    '400':
      description: 出勤記録がない、またはすでに休憩中
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
          examples:
            notClockedIn:
              value:
                error: no clock-in record found for today
            mustClockInFirst:
              value:
                error: must clock in before starting break
            alreadyStarted:
              value:
                error: break already started
    '401':
      $ref: '../responses/UnauthorizedError.yaml'
