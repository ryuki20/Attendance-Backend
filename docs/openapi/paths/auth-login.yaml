post:
  summary: ログイン
  description: メールアドレスとパスワードでログインし、JWTトークンを取得します
  operationId: login
  tags:
    - auth
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
            - password
          properties:
            email:
              type: string
              format: email
              example: yamada@example.com
              description: メールアドレス
            password:
              type: string
              format: password
              example: password123
              description: パスワード
  responses:
    '200':
      description: ログイン成功
      content:
        application/json:
          schema:
            type: object
            properties:
              token:
                type: string
                description: JWT認証トークン
                example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJlbXBsb3llZV9pZCI6IjU1MGU4NDAwLWUyOWItNDFkNC1hNzE2LTQ0NjY1NTQ0MDAwMCIsInJvbGUiOiJlbXBsb3llZSJ9.example
              employee:
                $ref: '../schemas/Employee.yaml'
    '401':
      description: 認証失敗
      content:
        application/json:
          schema:
            $ref: '../schemas/Error.yaml'
          example:
            error: invalid credentials
